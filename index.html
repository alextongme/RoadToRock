<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="Road to Rock">
  <meta property="og:description" content="Classic rock trivia game — test your knowledge of the legends.">
  <meta property="og:image" content="./screenshots/roadtorock.png">
  <title>Road to Rock</title>
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <video id="bgvid" playsinline autoplay muted loop>
    <source src="IntroVideosmall.webm" type="video/webm">
  </video>
  <video id="gamevid" class="hidden" playsinline autoplay muted loop>
    <source src="ledzeppelin.webm" type="video/webm">
  </video>
  <canvas id="noise-canvas"></canvas>
  <div class="grain-overlay"></div>
  <div class="vignette"></div>

  <!-- LANDING SCREEN -->
  <section id="landing" class="screen active">
    <div class="landing-content">
      <div class="title-block">
        <div class="title-accent">--- EST. 2016 ---</div>
        <h1 class="title">ROAD TO<br>ROCK</h1>
        <p class="subtitle">Think you know classic rock?</p>
      </div>
      <div class="landing-form">
        <div class="input-group">
          <input type="text" id="player-name" placeholder="YOUR NAME" autocomplete="off" spellcheck="false">
          <div class="input-line"></div>
        </div>
        <div class="name-required-hint" id="name-hint">ENTER YOUR NAME FIRST</div>
        <div class="difficulty-label">SELECT DIFFICULTY</div>
        <div class="difficulty-buttons">
          <button class="diff-btn" data-difficulty="easy">
            <span class="diff-name">Easy</span>
            <span class="diff-desc">The classics everyone knows</span>
          </button>
          <button class="diff-btn" data-difficulty="medium">
            <span class="diff-name">Medium</span>
            <span class="diff-desc">For the devoted listener</span>
          </button>
          <button class="diff-btn" data-difficulty="hard">
            <span class="diff-name">Hard</span>
            <span class="diff-desc">Only true connoisseurs</span>
          </button>
        </div>
      </div>
    </div>
    <div class="landing-footer">
      <span>30 SONGS</span>
      <span class="dot"></span>
      <span>3 LEVELS</span>
      <span class="dot"></span>
      <span>1 LEGEND</span>
    </div>
  </section>

  <!-- GAME SCREEN -->
  <section id="game" class="screen">
    <header class="game-header">
      <div class="game-logo">ROAD TO ROCK</div>
      <div class="player-tag">
        <span class="player-label">PLAYER</span>
        <span class="player-display-name"></span>
      </div>
      <div class="round-indicator">
        <span class="round-current">1</span>
        <span class="round-sep">/</span>
        <span class="round-total">10</span>
      </div>
    </header>

    <div class="game-body">
      <div class="score-panel">
        <div class="score-item score-correct">
          <div class="score-value" id="score-points">0</div>
          <div class="score-label">SCORE</div>
        </div>
        <div class="score-item score-strikes">
          <div class="score-value" id="score-strikes">0</div>
          <div class="score-label">STRIKES</div>
          <div class="strike-pips">
            <span class="pip" data-index="0"></span>
            <span class="pip" data-index="1"></span>
            <span class="pip" data-index="2"></span>
          </div>
        </div>
      </div>

      <div class="play-zone">
        <div class="play-zone-row">
          <button id="play-btn" class="play-button">
            <svg class="play-icon" viewBox="0 0 64 64" fill="none">
              <circle cx="32" cy="32" r="30" stroke="currentColor" stroke-width="2"/>
              <polygon points="26,20 26,44 46,32" fill="currentColor"/>
            </svg>
            <svg class="pause-icon" viewBox="0 0 64 64" fill="none">
              <circle cx="32" cy="32" r="30" stroke="currentColor" stroke-width="2"/>
              <rect x="23" y="18" width="6" height="28" rx="2" fill="currentColor"/>
              <rect x="35" y="18" width="6" height="28" rx="2" fill="currentColor"/>
            </svg>
            <span class="play-text">LISTEN</span>
          </button>
        </div>
        <div class="waveform">
          <div class="wave-bars">
            <!-- Generated by JS -->
          </div>
        </div>
      </div>

      <div class="answer-zone">
        <div class="answer-feedback" id="answer-feedback"></div>
        <form id="answer-form" autocomplete="off">
          <div class="answer-input-wrap">
            <input type="text" id="answer-input" placeholder="Name the artist..." autocomplete="off" spellcheck="false" disabled>
            <button type="submit" id="submit-btn" class="submit-button" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
      <div class="progress-markers" id="progress-markers"></div>
    </div>
  </section>

  <!-- RESULT SCREEN -->
  <section id="result" class="screen">
    <div class="result-content">
      <div class="result-icon" id="result-icon"></div>
      <h2 class="result-title" id="result-title"></h2>
      <div class="result-score-display">
        <span class="result-score-num" id="result-score">0</span>
        <span class="result-score-sep">/</span>
        <span class="result-score-total">10</span>
      </div>
      <p class="result-message" id="result-message"></p>
      <button id="play-again-btn" class="play-again-button">PLAY AGAIN</button>
    </div>
  </section>

  <!-- Fixed corner links -->
  <div class="corner-links">
    <a href="http://www.alextong.me" target="_blank" rel="noopener" aria-label="Portfolio" class="corner-link">
      <img src="/images/count_circle.png" alt="Portfolio" width="28" height="28">
    </a>
    <a href="http://www.github.com/alextongme" target="_blank" rel="noopener" aria-label="GitHub" class="corner-link">
      <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.09-.745.083-.73.083-.73 1.205.085 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.42-1.305.762-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.694.825.576C20.565 21.795 24 17.295 24 12 24 5.37 18.63 0 12 0z"/></svg>
    </a>
  </div>

  <script src="app.js"></script>
</body>
</html>
